# Fill in the PRIVATE IPs of router1 and router2 after running
# aws/setup-vpc-and-ec2.sh (ansible-control talks to them over the
# private subnet, not the internet).
#
# Run this INSIDE the ansible-control EC2 instance.

[routers]
router1 ansible_host=10.0.2.188
router2 ansible_host=10.0.2.142

[routers:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=/home/ubuntu/network-automation-key.pem
ansible_become=true
ansible_become_method=sudo
ansible_connection=ssh
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
